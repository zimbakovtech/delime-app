name: CI

# Runs on every pull request targeting the long-lived branches.
on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# A newer push to the same PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # sqflite_common_ffi loads the system SQLite for the repository tests.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0

      - run: flutter --version
      - run: flutter pub get

      - name: Run quality gates
        run: bash scripts/quality_gates.sh

  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --debug

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
