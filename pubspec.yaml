name: delime
description: "Delime — offline trip expense tracker. We split."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  # Local receipt photos — capture/pick an image and store it on-device only.
  image_picker: ^1.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.3 # in-memory SQLite for repository tests

flutter:
  uses-material-design: true
