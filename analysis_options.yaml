# Static analysis configuration for Delime.
#
# Builds on the recommended Flutter lint set with stricter type checking and a
# curated set of additional rules that keep the codebase clean and consistent.
# Run with `flutter analyze`.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Strong static guarantees — surface implicit dynamic and unsound casts.
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Hygiene issues that are easy to miss should fail analysis, not just warn.
    todo: ignore
    unused_import: error
    unused_local_variable: error
    unused_element: error
    dead_code: error
    avoid_relative_lib_imports: error

linter:
  rules:
    # Correctness / safety
    - always_use_package_imports
    - avoid_dynamic_calls
    - avoid_slow_async_io
    - cancel_subscriptions
    - close_sinks
    - throw_in_finally
    - unawaited_futures
    - unnecessary_statements

    # Style / consistency
    - prefer_single_quotes
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals
    - prefer_final_in_for_each
    - directives_ordering
    - sort_child_properties_last
    - require_trailing_commas
    - unnecessary_lambdas
    - unnecessary_parenthesis
    - use_super_parameters

    # API design
    - avoid_positional_boolean_parameters
    - use_enums
    - use_string_buffers
